<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success</title>

    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .success-box {
            background-color: #ffffff;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #4CAF50;
            font-size: 36px;
            margin-bottom: 15px;
        }

        p {
            color: #333;
            font-size: 20px;
        }

        a {
            display: inline-block;
            margin-top: 25px;
            padding: 10px 20px;
            background-color: #1f4037;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #3a685c;
        }
    </style>

</head>

<body>

    <div class="success-box">

        <h1>Success!</h1>

        <p>You have successfully logged in.</p>

        <a href="program1.6login.html">Go back to Login</a>
