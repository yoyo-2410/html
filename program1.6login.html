<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: rgba(255, 255, 255, 0.95);
            width: 350px;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            color: #1f4037;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 500;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }

        .footer-text a {
            color: #1f4037;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h2>Welcome Back!</h2>

        <form action="program1.6success.html">

            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Your Username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Your Password" required>

            <input type="submit" value="LOGIN NOW">

        </form>

        <div class="footer-text">
            <p>Need an account? <a href="#">Create One</a></p>
        </div>

    </div>

</body>

</html>
