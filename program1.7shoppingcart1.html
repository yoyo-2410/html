<!DOCTYPE html>
<html>

<head>
    <title>Shopping Cart</title>

    <style>
        * {
            box-sizing: border-box;
        }

        .column {
            float: left;
            width: 33.33%;
            padding: 5px;
            border-style: double;
        }

        img {
            width: 300px;
            height: 200px;
            object-fit: cover;
        }

        p {
            text-align: center;
            width: 100%;
        }
    </style>

</head>

<body bgcolor="#eaf6f6">

    <h2>Electronics</h2>

    <div class="row">

        <div class="column">
            <img src="./elec1.jpg" alt="Electronic 1" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

        <div class="column">
            <img src="./elec2.jpg" alt="Electronic 2" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

        <div class="column">
            <img src="./elec3.jpg" alt="Electronic 3" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

        <div class="column">
            <img src="./elec4.jpg" alt="Electronic 4" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

        <div class="column">
            <img src="./elec5.jpg" alt="Electronic 5" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

        <div class="column">
            <img src="./elec6.jpg" alt="Electronic 6" style="width:100%">
            <p>Price : Rs.100</p>
            <input type="button" style="background-color:#c4c1e0;width:100%" value="Add to Cart">
        </div>

    </div>

    <table width="100%" border="1px">

        <thead>
            <tr>
                <th>S.no</th>
                <th>Item</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3" style="text-align:right">Total</td>
                <td>₹</td>
            </tr>
        </tfoot>

    </table>

    <br>

    <input type="button" value="Proceed to Purchase">

</body>

</html>
